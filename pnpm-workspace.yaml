packages:
  - .
  - libs/**
  - apps/**

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  msgpackr-extract: true
  nx: true
  sharp: true

catalog:
  '@effect/platform': ^0.72.5
  '@effect/platform-node': ^0.66.5
  '@effect/rpc': ^0.50.0
  '@effect/rpc-http': ^0.49.0
  '@effect/schema': ^0.75.5
  '@supabase/supabase-js': ^2.47.10
  effect: 4.0.0-beta.70
  '@effect/vitest': 4.0.0-beta.70
  '@effect/atom-react': 4.0.0-beta.70
  ioredis: ^5.8.2
  kysely: ^0.27.5
  pg: ^8.13.1

minimumReleaseAgeExclude:
  - '@biomejs/biome@2.5.0'
  - '@biomejs/cli-darwin-arm64@2.5.0'
  - '@biomejs/cli-darwin-x64@2.5.0'
  - '@biomejs/cli-linux-arm64-musl@2.5.0'
  - '@biomejs/cli-linux-arm64@2.5.0'
  - '@biomejs/cli-linux-x64-musl@2.5.0'
  - '@biomejs/cli-linux-x64@2.5.0'
  - '@biomejs/cli-win32-arm64@2.5.0'
  - '@biomejs/cli-win32-x64@2.5.0'
